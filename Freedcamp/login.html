<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CEO Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --txt: #f8fafc;
      --blue: #3b82f6;
    }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--txt);
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    .login-card {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      width: 100%; max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo {
      width: 64px; height: 64px;
      background: var(--blue);
      color: white;
      font-size: 24px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px; margin: 0 auto 24px;
    }
    h1 { font-size: 24px; font-weight: 800; margin: 0 0 8px; }
    p { color: #94a3b8; font-size: 14px; margin: 0 0 32px; }
    .btn-google {
      background: white; color: #1e293b;
      border: none; padding: 12px 24px;
      border-radius: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; cursor: pointer; transition: all 0.2s;
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .btn-google img { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">FC</div>
    <h1>CEO Dashboard</h1>
    <p>Sign in to access Freedcamp metrics</p>
    <button class="btn-google" onclick="loginWithGoogle()" style="margin-bottom: 12px;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
      Sign in with Google
    </button>
    <button class="btn-google" onclick="loginAsGuest()" style="background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--border);">
      Continue as Guest (Dev)
    </button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="auth.js"></script>
  <script>
    // Just run the auth check
    checkAuthState();
  </script>
</body>
</html>
